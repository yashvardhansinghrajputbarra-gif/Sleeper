<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warrior Sleep Matrix System (Tactical HUD)</title>
    
    <meta name="theme-color" content="#06080c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --hud-bg: rgba(10, 15, 24, 0.7);
            --hud-border: rgba(56, 189, 248, 0.2);
            --hud-glow: rgba(56, 189, 248, 0.08);
            
            --text-neon: #38bdf8;
            --text-bright: #ffffff;
            --text-muted: #64748b;
            --text-dim: #334155;
            
            --accent-optimal: #06b6d4;
            --accent-past: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            background: #04060a;
            color: var(--text-bright);
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
            
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
            padding: 2vh 2vw;
        }

        /* Matrix Background Noise grid layer */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -2;
            pointer-events: none;
        }

        /* Ambient deep gradient */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 20%, #04060a 90%);
            z-index: -1;
            pointer-events: none;
        }

        /* Tactical HUD Main Frame */
        .hud-console {
            background: var(--hud-bg);
            border: 1px solid var(--hud-border);
            box-shadow: 0 0 40px var(--hud-glow), inset 0 0 20px rgba(56, 189, 248, 0.05);
            border-radius: 4px;
            
            width: 96vw;
            max-width: 1250px;
            height: 94vh;
            max-height: 880px;
            
            padding: 4vh 3vw;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        /* Decorative HUD Corner brackets */
        .hud-console::before, .hud-console::after {
            content: ""; position: absolute; width: 20px; height: 20px; border-color: var(--text-neon); border-style: solid; pointer-events: none;
        }
        .hud-console::before { top: -1px; left: -1px; border-width: 3px 0 0 3px; }
        .hud-console::after { bottom: -1px; right: -1px; border-width: 0 3px 3px 0; }

        header {
            text-align: center;
            border-bottom: 1px solid rgba(56, 189, 248, 0.15);
            padding-bottom: 2vh;
            margin-bottom: 2vh;
            position: relative;
        }

        .hud-tag {
            font-size: 1.2vh;
            letter-spacing: 5px;
            color: var(--text-neon);
            text-transform: uppercase;
            font-weight: 700;
        }

        /* System Wall Clock Display */
        .clock-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5vw;
            margin: 1vh 0;
        }

        .clock-num {
            font-size: 6vh;
            font-weight: 700;
            color: var(--text-bright);
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .clock-sec {
            font-size: 3vh;
            color: var(--text-neon);
            align-self: flex-end;
            margin-bottom: 0.8vh;
            opacity: 0.8;
        }

        .system-date {
            font-size: 1.3vh;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Grid Framework Layouts */
        .split-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4vw;
            flex-grow: 1;
            margin-bottom: 2vh;
        }

        .full-width-section {
            border-top: 1px dashed rgba(56, 189, 248, 0.15);
            padding-top: 2.5vh;
        }

        .clutter-free-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4vw;
        }

        .column-section {
            display: flex;
            flex-direction: column;
        }

        .column-headline {
            font-size: 1.3vh;
            font-weight: 700;
            margin-bottom: 1.5vh;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            border-left: 3px solid var(--text-neon);
            padding-left: 8px;
        }

        /* Tactical Node Module Rows */
        .interactive-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(56, 189, 248, 0.02);
            border: 1px solid rgba(56, 189, 248, 0.1);
            padding: 1.5vh 1.2vw;
            margin-bottom: 1.5vh;
            position: relative;
        }

        .interactive-row:focus-within {
            border-color: var(--text-neon);
            background: rgba(56, 189, 248, 0.05);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.1);
        }

        .input-meta-box {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .input-label {
            font-size: 1.1vh;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-neon);
            margin-bottom: 0.6vh;
        }

        .input-wrapper-inline {
            display: flex;
            gap: 2vw;
            align-items: center;
        }

        input[type="time"], input[type="number"] {
            background: transparent;
            border: none;
            color: var(--text-bright);
            font-size: 2.6vh;
            font-weight: 700;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            padding: 0;
        }

        input[type="number"] {
            width: 70px;
            border-bottom: 1px solid var(--text-neon);
        }

        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1) sepia(1) saturate(5) hue-rotate(175deg);
            cursor: pointer;
        }

        .live-section-counter {
            font-size: 1.3vh;
            font-weight: 700;
            color: var(--text-bright);
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid var(--text-neon);
            padding: 0.6vh 1vw;
            letter-spacing: 0.5px;
            text-shadow: 0 0 5px var(--text-neon);
        }

        .output-stack {
            display: flex;
            flex-direction: column;
            gap: 1vh;
        }

        /* Output Telemetry Modules */
        .metric-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2vh 1.2vw;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .metric-identity {
            display: flex;
            align-items: center;
            gap: 1.5vw;
        }

        .cycle-count {
            font-size: 1.2vh;
            font-weight: 700;
            color: var(--text-neon);
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 2px 6px;
            background: rgba(56, 189, 248, 0.05);
        }

        .time-value {
            font-size: 2.4vh;
            font-weight: 700;
            color: var(--text-bright);
        }

        .duration-label {
            font-size: 1.4vh;
            color: var(--text-muted);
        }

        .status-tracker {
            font-size: 1.2vh;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--accent-optimal);
            text-transform: uppercase;
        }

        .metric-item.past { 
            opacity: 0.15; 
            background: transparent;
            border-color: rgba(255, 255, 255, 0.02);
        }
        .metric-item.past .cycle-count { color: var(--text-muted); border-color: transparent; background: transparent; }

        .metric-item.optimal {
            background: rgba(6, 182, 212, 0.04);
            border-color: rgba(6, 182, 212, 0.3);
        }
        
        .metric-item.optimal .time-value {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        .notice-banner {
            font-size: 1.3vh;
            color: var(--text-muted);
            padding: 0 0 0.8vh 4px;
        }

        .notice-banner span {
            color: var(--text-neon);
            font-weight: 700;
        }

        @media (max-width: 850px) {
            body { overflow-y: auto; height: auto; padding: 20px 10px; }
            .hud-console { height: auto; max-height: none; padding: 30px 15px; }
            .split-grid, .clutter-free-grid { grid-template-columns: 1fr; gap: 30px; }
            .interactive-row { padding: 15px; }
            .clock-num { font-size: 45px; }
            input[type="time"], input[type="number"] { font-size: 22px; }
            .time-value { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="hud-console">
        <header>
            <div class="hud-tag">// SLEEP MATRIX COMMAND CONSOLE</div>
            
            <div class="clock-row">
                <span class="clock-num" id="coreClock">00:00</span>
                <span class="clock-sec" id="coreSec">.00</span>
            </div>

            <div class="system-date" id="coreDate">SYSTEM LOG OFFLINE</div>
        </header>

        <div class="split-grid">
            <div class="column-section">
                <div class="column-headline">
                    <span>⚡ BEDTIME STRATEGY</span>
                </div>
                <div class="interactive-row">
                    <div class="input-meta-box">
                        <span class="input-label">PLANNED DEPARTURE</span>
                        <input type="time" id="bedtime" oninput="calculateWakeup()">
                    </div>
                    <div class="live-section-counter" id="bedtimeCountdown">T-MINUS 00h 00m</div>
                </div>
                <div id="bedtimeNotice"></div>
                <div class="output-stack" id="bedtimeResults"></div>
            </div>

            <div class="column-section">
                <div class="column-headline">
                    <span>⚡ WAKEUP TARGETS</span>
                </div>
                <div class="interactive-row">
                    <div class="input-meta-box">
                        <span class="input-label">ALARM CONFIGURATION</span>
                        <input type="time" id="wakeuptime" oninput="calculateBedtimes()">
                    </div>
                    <div class="live-section-counter" id="wakeupCountdown">T-MINUS 00h 00m</div>
                </div>
                <div class="output-stack" id="wakeupResults"></div>
            </div>
        </div>

        <div class="full-width-section">
            <div class="clutter-free-grid">
                
                <div class="column-section">
                    <div class="column-headline">📊 TELEMETRY EVALUATOR</div>
                    <div class="interactive-row">
                        <div class="input-wrapper-inline" style="width: 100%;">
                            <div class="input-meta-box">
                                <span class="input-label">SLEEP TIME</span>
                                <input type="time" id="directSleepTime" oninput="evaluateDuration()">
                            </div>
                            <div class="input-meta-box">
                                <span class="input-label">WAKE TIME</span>
                                <input type="time" id="directWakeTime" oninput="evaluateDuration()">
                            </div>
                        </div>
                    </div>
                    <div class="output-stack" id="durationResult"></div>
                </div>

                <div class="column-section">
                    <div class="column-headline">🎯 SPECIFIC HOURS STRATEGY</div>
                    <div class="interactive-row">
                        <div class="input-wrapper-inline" style="width: 100%;">
                            <div class="input-meta-box">
                                <span class="input-label">TARGET WAKE TIME</span>
                                <input type="time" id="targetWakeTime" oninput="evaluateBedtimeTarget()">
                            </div>
                            <div class="input-meta-box">
                                <span class="input-label">HOURS DESIRED</span>
                                <input type="number" id="desiredHours" min="1" max="24" step="0.5" oninput="evaluateBedtimeTarget()">
                            </div>
                        </div>
                    </div>
                    <div class="output-stack" id="targetBedtimeResult"></div>
                </div>

            </div>
        </div>
    </div>

<script>
    function formatAMPM(date) {
        let hours = date.getHours();
        let minutes = date.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        minutes = String(minutes).padStart(2, '0');
        return `${hours}:${minutes} ${ampm}`;
    }

    function saveValue(id, value) {
        localStorage.setItem(id, value);
    }

    function getNextTargetDate(timeString) {
        if (!timeString) return null;
        const [h, m] = timeString.split(':').map(Number);
        const now = new Date();
        let target = new Date();
        target.setHours(h, m, 0, 0);
        if (target < now) {
            target.setDate(target.getDate() + 1);
        }
        return target;
    }

    // Dynamic continuous execution engine loops
    function systemDynamicEngineTick() {
        const now = new Date();

        // 1. Sync System Clock Displays
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        
        document.getElementById("coreClock").textContent = `${String(hours).padStart(2, '0')}:${minutes}`;
        document.getElementById("coreSec").textContent = `.${seconds} ${ampm}`;

        const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
        document.getElementById("coreDate").textContent = `LOC // ${now.toLocaleDateString('en-US', options)}`;

        // 2. Sync Active Live Bedtime Countdowns
        const bedtimeVal = document.getElementById('bedtime').value;
        const bedBadge = document.getElementById('bedtimeCountdown');
        if (bedtimeVal) {
            const targetBed = getNextTargetDate(bedtimeVal);
            let diff = targetBed - now;
            let h = String(Math.floor(diff / 3600000)).padStart(2, '0');
            let m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
            let s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
            bedBadge.innerText = `T-MINUS ${h}h ${m}m ${s}s`;
        }

        // 3. Sync Active Live Wakeup Target Countdowns
        const wakeVal = document.getElementById('wakeuptime').value;
        const wakeBadge = document.getElementById('wakeupCountdown');
        if (wakeVal) {
            const targetWake = getNextTargetDate(wakeVal);
            let diff = targetWake - now;
            let h = String(Math.floor(diff / 3600000)).padStart(2, '0');
            let m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
            let s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
            wakeBadge.innerText = `T-MINUS ${h}h ${m}m ${s}s`;
        }

        calculateBedtimes();
    }

    function calculateWakeup() {
        const bedtimeInput = document.getElementById('bedtime').value;
        if (!bedtimeInput) return;
        saveValue('bedtime', bedtimeInput);

        const [hours, minutes] = bedtimeInput.split(':').map(Number);
        let sleepTime = new Date();
        sleepTime.setHours(hours, minutes, 0, 0);
        sleepTime.setMinutes(sleepTime.getMinutes() + 10);

        document.getElementById('bedtimeNotice').innerHTML = `
            <div class="notice-banner">> SLEEP ONSET DETECTED AT <span>${formatAMPM(sleepTime)}</span></div>
        `;
        
        const container = document.getElementById('bedtimeResults');
        container.innerHTML = "";
        
        const cyclesMap = {3: '4.5h', 4: '6.0h', 5: '7.5h', 6: '9.0h'};
        [3, 4, 5, 6].forEach(cycles => {
            const duration = cycles * 90;
            const wakeup = new Date(sleepTime.getTime() + duration * 60000);
            const item = document.createElement('div');
            item.className = (cycles === 5 || cycles === 6) ? 'metric-item optimal' : 'metric-item';
            
            item.innerHTML = `
                <div class="metric-identity">
                    <span class="cycle-count">${cycles} CYCLES [${cyclesMap[cycles]}]</span>
                    <span class="time-value">${formatAMPM(wakeup)}</span>
                </div>
                ${(cycles === 5 || cycles === 6) ? '<span class="status-tracker">OPTIMAL REGIMEN</span>' : `<span class="duration-label">${Math.floor(duration / 60)}h ${duration % 60}m</span>`}
            `;
            container.appendChild(item);
        });
    }

    function calculateBedtimes() {
        const wakeupInput = document.getElementById('wakeuptime').value;
        if (!wakeupInput) return;
        saveValue('wakeuptime', wakeupInput);

        const [wHours, wMinutes] = wakeupInput.split(':').map(Number);
        const now = new Date();
        let wakeupTime = new Date();
        wakeupTime.setHours(wHours, wMinutes, 0, 0);

        if (wakeupTime < now && (now.getTime() - wakeupTime.getTime() > 3600000)) {
            wakeupTime.setDate(wakeupTime.getDate() + 1);
        }

        const container = document.getElementById('wakeupResults');
        const currentHTML = container.innerHTML;
        
        let newHTML = "";
        let optimalFound = false;
        const cyclesMap = {6: '9.0h', 5: '7.5h', 4: '6.0h', 3: '4.5h'};

        [6, 5, 4, 3].forEach(cycles => {
            const duration = cycles * 90;
            const bedtime = new Date(wakeupTime.getTime() - (duration + 10) * 60000);
            const hoursCount = Math.floor(duration / 60);
            const minsCount = duration % 60;

            if (now > bedtime) {
                newHTML += `
                    <div class="metric-item past">
                        <div class="metric-identity">
                            <span class="cycle-count">${cycles} CYCLES [${cyclesMap[cycles]}]</span>
                            <span class="time-value">${formatAMPM(bedtime)}</span>
                        </div>
                        <span class="duration-label">ELAPSED</span>
                    </div>`;
            } else if (!optimalFound && (cycles === 5 || cycles === 6)) {
                newHTML += `
                    <div class="metric-item optimal">
                        <div class="metric-identity">
                            <span class="cycle-count">${cycles} CYCLES [${cyclesMap[cycles]}]</span>
                            <span class="time-value">${formatAMPM(bedtime)}</span>
                        </div>
                        <span class="status-tracker">OPTIMAL REGIMEN</span>
                    </div>`;
                optimalFound = true;
            } else {
                newHTML += `
                    <div class="metric-item">
                        <div class="metric-identity">
                            <span class="cycle-count">${cycles} CYCLES [${cyclesMap[cycles]}]</span>
                            <span class="time-value">${formatAMPM(bedtime)}</span>
                        </div>
                        <span class="duration-label">${hoursCount}h ${minsCount}m</span>
                    </div>`;
            }
        });

        if (currentHTML !== newHTML) {
            container.innerHTML = newHTML;
        }
    }

    function evaluateDuration() {
        const sleepInput = document.getElementById('directSleepTime').value;
        const wakeInput = document.getElementById('directWakeTime').value;
        if (!sleepInput || !wakeInput) return;
        
        saveValue('directSleepTime', sleepInput);
        saveValue('directWakeTime', wakeInput);

        const [sH, sM] = sleepInput.split(':').map(Number);
        const [wH, wM] = wakeInput.split(':').map(Number);

        let sleepDate = new Date(2000, 0, 1, sH, sM);
        let wakeDate = new Date(2000, 0, 1, wH, wM);

        if (wakeDate <= sleepDate) {
            wakeDate.setDate(wakeDate.getDate() + 1);
        }

        let diffMs = wakeDate - sleepDate - (10 * 60 * 1000);
        if (diffMs < 0) diffMs = 0;

        const totalMinutes = Math.floor(diffMs / 60000);
        const hrs = Math.floor(totalMinutes / 60);
        const mins = totalMinutes % 60;

        document.getElementById('durationResult').innerHTML = `
            <div class="metric-item optimal" style="width: 100%">
                <div class="metric-identity">
                    <span class="time-value">${hrs}h ${mins}m</span>
                </div>
                <span class="status-tracker">NET DURATION CALCULATED</span>
            </div>`;
    }

    function evaluateBedtimeTarget() {
        const wakeInput = document.getElementById('targetWakeTime').value;
        const hoursDesired = parseFloat(document.getElementById('desiredHours').value);
        if (!wakeInput || isNaN(hoursDesired)) return;

        saveValue('targetWakeTime', wakeInput);
        saveValue('desiredHours', hoursDesired);

        const [wH, wM] = wakeInput.split(':').map(Number);
        let wakeDate = new Date(2000, 0, 2, wH, wM); 

        const totalMinutesToSubtract = (hoursDesired * 60) + 10;
        let bedtimeDate = new Date(wakeDate.getTime() - (totalMinutesToSubtract * 60000));

        document.getElementById('targetBedtimeResult').innerHTML = `
            <div class="metric-item optimal" style="width: 100%">
                <div class="metric-identity">
                    <span class="time-value">${formatAMPM(bedtimeDate)}</span>
                </div>
                <span class="status-tracker">OPTIMAL INTERCEPT BEDTIME</span>
            </div>`;
    }

    // Storage Initialization
    const defaultTimes = {
        'bedtime': '22:30',
        'wakeuptime': '06:00',
        'directSleepTime': '23:00',
        'directWakeTime': '07:00',
        'targetWakeTime': '06:30',
        'desiredHours': '8'
    };

    Object.keys(defaultTimes).forEach(id => {
        const saved = localStorage.getItem(id);
        document.getElementById(id).value = saved !== null ? saved : defaultTimes[id];
    });
    
    // Initial triggers
    calculateWakeup();
    calculateBedtimes();
    evaluateDuration();
    evaluateBedtimeTarget();

    // Loop system loops
    systemDynamicEngineTick();
    setInterval(systemDynamicEngineTick, 1000);
</script>

</body>
</html>
