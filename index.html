<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sleeper Matrix System Pro</title>
    
    <style>
        :root {
            --bg-main: #0a0c10;
            --panel-bg: rgba(18, 22, 30, 0.7);
            --panel-border: rgba(255, 255, 255, 0.05);
            --panel-glow: rgba(245, 158, 11, 0.03);
            
            --accent-warm: #f59e0b;
            --accent-warm-dim: rgba(245, 158, 11, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --text-dark: #4b5563;

            /* Drawer Variables */
            --drawer-bg: rgba(15, 19, 26, 0.95);
            --drawer-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            background: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
            
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
            padding: 2vh 2vw;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient Premium Lighting Backgrounds */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 80% 20%, rgba(245, 158, 11, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(37, 99, 235, 0.03) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        /* Centered Core Dashboard Structure */
        .main-container {
            background: var(--panel-bg);
            backdrop-filter: blur(30px) saturate(170%);
            -webkit-backdrop-filter: blur(30px) saturate(170%);
            border: 1px solid var(--panel-border);
            border-top: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 24px;
            box-shadow: 
                0 30px 70px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
            
            width: 95vw;
            max-width: 1240px;
            height: 93vh;
            max-height: 850px;
            
            padding: 4vh 3vw;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        /* Premium Centerpiece Clock Header */
        header {
            text-align: center;
            margin-bottom: 1.5vh;
        }

        .sys-title {
            margin: 0;
            font-size: 1.2vh;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .clock-container {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 4px;
            margin: 0.5vh 0;
        }

        .clock-digits {
            font-size: 5.5vh;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
        }

        .clock-suffix {
            font-size: 2vh;
            font-weight: 500;
            color: var(--accent-warm);
            margin-left: 6px;
        }

        .date-display {
            font-size: 1.3vh;
            font-weight: 500;
            color: var(--text-dark);
            letter-spacing: 0.5px;
        }

        /* Layout Architecture Split Matrices */
        .split-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3vw;
            flex-grow: 1;
            margin-bottom: 2vh;
        }

        .lower-dock {
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 2vh;
        }

        .dock-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3vw;
        }

        .card-column {
            display: flex;
            flex-direction: column;
        }

        .section-label {
            font-size: 1.3vh;
            font-weight: 600;
            margin-bottom: 1vh;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* High-End Input Module Strips */
        .input-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 1.2vh 1.2vw;
            margin-bottom: 1.2vh;
        }

        .input-strip:focus-within {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(245, 158, 11, 0.3);
        }

        .input-meta {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .meta-title {
            font-size: 1.1vh;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dark);
            margin-bottom: 0.3vh;
        }

        .input-wrapper-row {
            display: flex;
            gap: 2vw;
            align-items: center;
        }

        input[type="time"], input[type="number"] {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 2.3vh;
            font-weight: 600;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            padding: 0;
        }

        input[type="number"] {
            width: 60px;
            border-bottom: 1px solid var(--text-dark);
            text-align: left;
        }

        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(0.6);
            cursor: pointer;
        }

        .live-badge {
            font-size: 1.2vh;
            font-weight: 600;
            color: var(--accent-warm);
            background: var(--accent-warm-dim);
            padding: 0.5vh 0.8vw;
            border-radius: 8px;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        /* Elegant Output Telemetry Blocks */
        .output-stack {
            display: flex;
            flex-direction: column;
            gap: 0.8vh;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1vh 1vw;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 10px;
            border: 1px solid transparent;
        }

        .metric-core {
            display: flex;
            align-items: center;
            gap: 1vw;
        }

        .pill-tag {
            font-size: 1.1vh;
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.04);
            padding: 3px 8px;
            border-radius: 6px;
        }

        .time-readout {
            font-size: 2.1vh;
            font-weight: 600;
            color: var(--text-main);
        }

        .label-readout {
            font-size: 1.3vh;
            color: var(--text-dark);
        }

        .tag-status-optimal {
            font-size: 1.1vh;
            font-weight: 600;
            color: var(--accent-warm);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Metric Row Conditional States */
        .metric-row.past { 
            opacity: 0.2; 
        }

        .metric-row.optimal {
            background: rgba(245, 158, 11, 0.02);
            border-color: rgba(245, 158, 11, 0.1);
        }

        .onset-banner {
            font-size: 1.2vh;
            color: var(--text-dark);
            padding: 0 0 0.6vh 4px;
        }

        .onset-banner span {
            color: var(--text-muted);
            font-weight: 600;
        }

        /* ==================== HIDDEN UTILITY DRAWER SYSTEM ==================== */
        .drawer-toggle-btn {
            position: absolute;
            top: 3vh;
            right: 2vw;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
            color: var(--text-muted);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .drawer-toggle-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .utility-drawer {
            position: fixed;
            top: 0;
            right: -420px; /* Hidden off-screen baseline */
            width: 380px;
            height: 100vh;
            background: var(--drawer-bg);
            border-left: 1px solid var(--drawer-border);
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 99;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 40px 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .utility-drawer.open {
            right: 0;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
        }

        .drawer-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent-warm);
        }

        .drawer-close-btn {
            background: transparent;
            border: none;
            color: var(--text-dark);
            font-size: 20px;
            cursor: pointer;
        }

        .drawer-close-btn:hover {
            color: var(--text-main);
        }

        .calc-box {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
        }

        .calc-headline {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .calc-row-inputs {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        .drawer-input-group {
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 8px 12px;
            flex: 1;
        }

        .drawer-input-group span {
            font-size: 9px;
            text-transform: uppercase;
            color: var(--text-dark);
            font-weight: 600;
            margin-bottom: 2px;
        }

        .drawer-input-group input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 600;
            outline: none;
            font-family: inherit;
        }

        .drawer-input-group input[type="number"] {
            width: 100%;
        }

        .calc-action-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .math-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            padding: 8px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
        }

        .math-btn:hover {
            background: var(--accent-warm-dim);
            border-color: var(--accent-warm);
        }

        .calc-result-strip {
            background: rgba(245, 158, 11, 0.03);
            border: 1px solid rgba(245, 158, 11, 0.1);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .calc-res-lbl {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 500;
        }

        .calc-res-val {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        @media (max-width: 850px) {
            body { overflow-y: auto; height: auto; padding: 20px 10px; }
            .main-container { height: auto; max-height: none; padding: 25px 15px; border-radius: 16px; }
            .split-grid, .dock-grid { grid-template-columns: 1fr; gap: 25px; }
            .input-strip { padding: 12px; }
            .clock-digits { font-size: 38px; }
            input[type="time"], input[type="number"] { font-size: 18px; }
            .time-readout { font-size: 18px; }
            .utility-drawer { width: 100vw; right: -100vw; }
            .drawer-toggle-btn { position: fixed; top: 15px; right: 15px; }
        }
    </style>
</head>
<body>

    <button class="drawer-toggle-btn" onclick="toggleDrawer()">[ = ] Quick Calc</button>

    <div class="main-container">
        <header>
            <h1 class="sys-title">Sleep Matrix System</h1>
            
            <div class="clock-container">
                <span class="clock-digits" id="timeDigits">00:00</span>
                <span class="clock-suffix" id="timeSuffix">AM</span>
            </div>

            <div class="date-display" id="dateDigits">SYSTEM ACTIVE</div>
        </header>

        <div class="split-grid">
            <div class="card-column">
                <div class="section-label">🌙 Bedtime Strategy</div>
                <div class="input-strip">
                    <div class="input-meta">
                        <span class="meta-title">Planned Departure</span>
                        <input type="time" id="bedtime" oninput="runWakeupAnalysis()">
                    </div>
                    <div class="live-badge" id="bedtimeCountdown">00h 00m left</div>
                </div>
                <div id="onsetNotification"></div>
                <div class="output-stack" id="bedtimeOutputStack"></div>
            </div>

            <div class="card-column">
                <div class="section-label">☀️ Wakeup Targets</div>
                <div class="input-strip">
                    <div class="input-meta">
                        <span class="meta-title">Alarm Configuration</span>
                        <input type="time" id="wakeuptime" oninput="runBedtimeAnalysis()">
                    </div>
                    <div class="live-badge" id="wakeupCountdown">00h 00m left</div>
                </div>
                <div class="output-stack" id="wakeupOutputStack"></div>
            </div>
        </div>

        <div class="lower-dock">
            <div class="dock-grid">
                
                <div class="card-column">
                    <div class="section-label">⏱️ Telemetry Calculator</div>
                    <div class="input-strip">
                        <div class="input-wrapper-row" style="width: 100%;">
                            <div class="input-meta">
                                <span class="meta-title">Sleep Time</span>
                                <input type="time" id="directSleepTime" oninput="runDurationAnalysis()">
                            </div>
                            <div class="input-meta">
                                <span class="meta-title">Wake Time
