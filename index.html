<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sleeper Matrix System Pro</title>
    
    <style>
        :root {
            --bg-main: #0a0c10;
            --panel-bg: rgba(18, 22, 30, 0.7);
            --panel-border: rgba(255, 255, 255, 0.05);
            --panel-glow: rgba(245, 158, 11, 0.03);
            
            --accent-warm: #f59e0b;
            --accent-warm-dim: rgba(245, 158, 11, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --text-dark: #4b5563;
        }

        body {
            margin: 0;
            background: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
            
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
            padding: 2vh 2vw;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient Premium Lighting Backgrounds */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 80% 20%, rgba(245, 158, 11, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(37, 99, 235, 0.03) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        /* Centered Core Dashboard Structure */
        .main-container {
            background: var(--panel-bg);
            backdrop-filter: blur(30px) saturate(170%);
            -webkit-backdrop-filter: blur(30px) saturate(170%);
            border: 1px solid var(--panel-border);
            border-top: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 24px;
            box-shadow: 
                0 30px 70px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.02);
            
            width: 95vw;
            max-width: 1240px;
            height: 93vh;
            max-height: 850px;
            
            padding: 4vh 3vw;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Premium Centerpiece Clock Header */
        header {
            text-align: center;
            margin-bottom: 1.5vh;
        }

        .sys-title {
            margin: 0;
            font-size: 1.2vh;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .clock-container {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 4px;
            margin: 0.5vh 0;
        }

        .clock-digits {
            font-size: 5.5vh;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
        }

        .clock-suffix {
            font-size: 2vh;
            font-weight: 500;
            color: var(--accent-warm);
            margin-left: 6px;
        }

        .date-display {
            font-size: 1.3vh;
            font-weight: 500;
            color: var(--text-dark);
            letter-spacing: 0.5px;
        }

        /* Layout Architecture Split Matrices */
        .split-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3vw;
            flex-grow: 1;
            margin-bottom: 2vh;
        }

        .lower-dock {
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 2vh;
        }

        .dock-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3vw;
        }

        .card-column {
            display: flex;
            flex-direction: column;
        }

        .section-label {
            font-size: 1.3vh;
            font-weight: 600;
            margin-bottom: 1vh;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* High-End Input Module Strips */
        .input-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 1.2vh 1.2vw;
            margin-bottom: 1.2vh;
        }

        .input-strip:focus-within {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(245, 158, 11, 0.3);
        }

        .input-meta {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .meta-title {
            font-size: 1.1vh;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dark);
            margin-bottom: 0.3vh;
        }

        .input-wrapper-row {
            display: flex;
            gap: 2vw;
            align-items: center;
        }

        input[type="time"], input[type="number"] {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 2.3vh;
            font-weight: 600;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            padding: 0;
        }

        input[type="number"] {
            width: 60px;
            border-bottom: 1px solid var(--text-dark);
            text-align: left;
        }

        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(0.6);
            cursor: pointer;
        }

        .live-badge {
            font-size: 1.2vh;
            font-weight: 600;
            color: var(--accent-warm);
            background: var(--accent-warm-dim);
            padding: 0.5vh 0.8vw;
            border-radius: 8px;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        /* Elegant Output Telemetry Blocks */
        .output-stack {
            display: flex;
            flex-direction: column;
            gap: 0.8vh;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1vh 1vw;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 10px;
            border: 1px solid transparent;
        }

        .metric-core {
            display: flex;
            align-items: center;
            gap: 1vw;
        }

        .pill-tag {
            font-size: 1.1vh;
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.04);
            padding: 3px 8px;
            border-radius: 6px;
        }

        .time-readout {
            font-size: 2.1vh;
            font-weight: 600;
            color: var(--text-main);
        }

        .label-readout {
            font-size: 1.3vh;
            color: var(--text-dark);
        }

        .tag-status-optimal {
            font-size: 1.1vh;
            font-weight: 600;
            color: var(--accent-warm);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Metric Row Conditional States */
        .metric-row.past { 
            opacity: 0.2; 
        }

        .metric-row.optimal {
            background: rgba(245, 158, 11, 0.02);
            border-color: rgba(245, 158, 11, 0.1);
        }

        .onset-banner {
            font-size: 1.2vh;
            color: var(--text-dark);
            padding: 0 0 0.6vh 4px;
        }

        .onset-banner span {
            color: var(--text-muted);
            font-weight: 600;
        }

        @media (max-width: 850px) {
            body { overflow-y: auto; height: auto; padding: 20px 10px; }
            .main-container { height: auto; max-height: none; padding: 25px 15px; border-radius: 16px; }
            .split-grid, .dock-grid { grid-template-columns: 1fr; gap: 25px; }
            .input-strip { padding: 12px; }
            .clock-digits { font-size: 38px; }
            input[type="time"], input[type="number"] { font-size: 18px; }
            .time-readout { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h1 class="sys-title">Sleep Matrix System</h1>
            
            <div class="clock-container">
                <span class="clock-digits" id="timeDigits">00:00</span>
                <span class="clock-suffix" id="timeSuffix">AM</span>
            </div>

            <div class="date-display" id="dateDigits">SYSTEM ACTIVE</div>
        </header>

        <div class="split-grid">
            <div class="card-column">
                <div class="section-label">🌙 Bedtime Strategy</div>
                <div class="input-strip">
                    <div class="input-meta">
                        <span class="meta-title">Planned Departure</span>
                        <input type="time" id="bedtime" oninput="runWakeupAnalysis()">
                    </div>
                    <div class="live-badge" id="bedtimeCountdown">00h 00m left</div>
                </div>
                <div id="onsetNotification"></div>
                <div class="output-stack" id="bedtimeOutputStack"></div>
            </div>

            <div class="card-column">
                <div class="section-label">☀️ Wakeup Targets</div>
                <div class="input-strip">
                    <div class="input-meta">
                        <span class="meta-title">Alarm Configuration</span>
                        <input type="time" id="wakeuptime" oninput="runBedtimeAnalysis()">
                    </div>
                    <div class="live-badge" id="wakeupCountdown">00h 00m left</div>
                </div>
                <div class="output-stack" id="wakeupOutputStack"></div>
            </div>
        </div>

        <div class="lower-dock">
            <div class="dock-grid">
                
                <div class="card-column">
                    <div class="section-label">⏱️ Telemetry Calculator</div>
                    <div class="input-strip">
                        <div class="input-wrapper-row" style="width: 100%;">
                            <div class="input-meta">
                                <span class="meta-title">Sleep Time</span>
                                <input type="time" id="directSleepTime" oninput="runDurationAnalysis()">
                            </div>
                            <div class="input-meta">
                                <span class="meta-title">Wake Time</span>
                                <input type="time" id="directWakeTime" oninput="runDurationAnalysis()">
                            </div>
                        </div>
                    </div>
                    <div class="output-stack" id="durationOutputBox"></div>
                </div>

                <div class="card-column">
                    <div class="section-label">🎯 Target Hours Configuration</div>
                    <div class="input-strip">
                        <div class="input-wrapper-row" style="width: 100%;">
                            <div class="input-meta">
                                <span class="meta-title">Target Wake Time</span>
                                <input type="time" id="targetWakeTime" oninput="runTargetAnalysis()">
                            </div>
                            <div class="input-meta">
                                <span class="meta-title">Desired Hours</span>
                                <input type="number" id="desiredHours" min="1" max="24" step="0.5" oninput="runTargetAnalysis()">
                            </div>
                        </div>
                    </div>
                    <div class="output-stack" id="targetOutputBox"></div>
                </div>

            </div>
        </div>
    </div>

<script>
    function formatTimeStrings(date) {
        let hours = date.getHours();
        let minutes = date.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        minutes = String(minutes).padStart(2, '0');
        return `${hours}:${minutes} ${ampm}`;
    }

    function saveState(id, value) {
        localStorage.setItem(id, value);
    }

    function getTargetDateObject(timeString) {
        if (!timeString) return null;
        const [h, m] = timeString.split(':').map(Number);
        const now = new Date();
        let target = new Date();
        target.setHours(h, m, 0, 0);
        if (target < now) {
            target.setDate(target.getDate() + 1);
        }
        return target;
    }

    // High performance UI ticking logic loops
    function systemHeartbeatEngine() {
        const now = new Date();

        // 1. Sync Dashboard Master Clock Values
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        
        document.getElementById("timeDigits").textContent = `${String(hours).padStart(2, '0')}:${minutes}`;
        document.getElementById("timeSuffix").textContent = ampm;

        const dateOptions = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
        document.getElementById("dateDigits").textContent = now.toLocaleDateString('en-US', dateOptions).toUpperCase();

        // 2. Compute Active Countdown Nodes
        const bInput = document.getElementById('bedtime').value;
        const bBadge = document.getElementById('bedtimeCountdown');
        if (bInput) {
            const tBed = getTargetDateObject(bInput);
            let d = tBed - now;
            let h = String(Math.floor(d / 3600000)).padStart(2, '0');
            let m = String(Math.floor((d % 3600000) / 60000)).padStart(2, '0');
            bBadge.innerText = `${h}h ${m}m remaining`;
        }

        const wInput = document.getElementById('wakeuptime').value;
        const wBadge = document.getElementById('wakeupCountdown');
        if (wInput) {
            const tWake = getTargetDateObject(wInput);
            let d = tWake - now;
            let h = String(Math.floor(d / 3600000)).padStart(2, '0');
            let m = String(Math.floor((d % 3600000) / 60000)).padStart(2, '0');
            wBadge.innerText = `${h}h ${m}m remaining`;
        }

        runBedtimeAnalysis();
    }

    function runWakeupAnalysis() {
        const inputVal = document.getElementById('bedtime').value;
        if (!inputVal) return;
        saveState('bedtime', inputVal);

        const [h, m] = inputVal.split(':').map(Number);
        let sleepOnset = new Date();
        sleepOnset.setHours(h, m, 0, 0);
        sleepOnset.setMinutes(sleepOnset.getMinutes() + 10);

        document.getElementById('onsetNotification').innerHTML = `
            <div class="onset-banner">Approximate sleep onset: <span>${formatTimeStrings(sleepOnset)}</span></div>
        `;
        
        const stack = document.getElementById('bedtimeOutputStack');
        stack.innerHTML = "";
        
        const labelsMap = {3: '4.5h', 4: '6.0h', 5: '7.5h', 6: '9.0h'};
        [3, 4, 5, 6].forEach(cycles => {
            const mins = cycles * 90;
            const wakeTarget = new Date(sleepOnset.getTime() + mins * 60000);
            const row = document.createElement('div');
            row.className = (cycles === 5 || cycles === 6) ? 'metric-row optimal' : 'metric-row';
            
            row.innerHTML = `
                <div class="metric-core">
                    <span class="pill-tag">${cycles} Cycles [${labelsMap[cycles]}]</span>
                    <span class="time-readout">${formatTimeStrings(wakeTarget)}</span>
                </div>
                ${(cycles === 5 || cycles === 6) ? '<span class="tag-status-optimal">Optimal Target</span>' : `<span class="label-readout">${Math.floor(mins / 60)}h ${mins % 60}m</span>`}
            `;
            stack.appendChild(row);
        });
    }

    function runBedtimeAnalysis() {
        const inputVal = document.getElementById('wakeuptime').value;
        if (!inputVal) return;
        saveState('wakeuptime', inputVal);

        const [wH, wM] = inputVal.split(':').map(Number);
        const now = new Date();
        let wakeTarget = new Date();
        wakeTarget.setHours(wH, wM, 0, 0);

        if (wakeTarget < now && (now.getTime() - wakeTarget.getTime() > 3600000)) {
            wakeTarget.setDate(wakeTarget.getDate() + 1);
        }

        const stack = document.getElementById('wakeupOutputStack');
        const internalSnapshot = stack.innerHTML;
        
        let calculatedHTML = "";
        let optimalFlag = false;
        const labelsMap = {6: '9.0h', 5: '7.5h', 4: '6.0h', 3: '4.5h'};

        [6, 5, 4, 3].forEach(cycles => {
            const mins = cycles * 90;
            const bedtimeTarget = new Date(wakeTarget.getTime() - (mins + 10) * 60000);
            const hrsCount = Math.floor(mins / 60);
            const minsCount = mins % 60;

            if (now > bedtimeTarget) {
                calculatedHTML += `
                    <div class="metric-row past">
                        <div class="metric-core">
                            <span class="pill-tag">${cycles} Cycles [${labelsMap[cycles]}]</span>
                            <span class="time-readout">${formatTimeStrings(bedtimeTarget)}</span>
                        </div>
                        <span class="label-readout">Elapsed</span>
                    </div>`;
            } else if (!optimalFlag && (cycles === 5 || cycles === 6)) {
                calculatedHTML += `
                    <div class="metric-row optimal">
                        <div class="metric-core">
                            <span class="pill-tag">${cycles} Cycles [${labelsMap[cycles]}]</span>
                            <span class="time-readout">${formatTimeStrings(bedtimeTarget)}</span>
                        </div>
                        <span class="tag-status-optimal">Optimal Target</span>
                    </div>`;
                optimalFlag = true;
            } else {
                calculatedHTML += `
                    <div class="metric-row">
                        <div class="metric-core">
                            <span class="pill-tag">${cycles} Cycles [${labelsMap[cycles]}]</span>
                            <span class="time-readout">${formatTimeStrings(bedtimeTarget)}</span>
                        </div>
                        <span class="label-readout">${hrsCount}h ${minsCount}m</span>
                    </div>`;
            }
        });

        if (internalSnapshot !== calculatedHTML) {
            stack.innerHTML = calculatedHTML;
        }
    }

    function runDurationAnalysis() {
        const sVal = document.getElementById('directSleepTime').value;
        const wVal = document.getElementById('directWakeTime').value;
        if (!sVal || !wVal) return;
        
        saveState('directSleepTime', sVal);
        saveState('directWakeTime', wVal);

        const [sH, sM] = sVal.split(':').map(Number);
        const [wH, wM] = wVal.split(':').map(Number);

        let sDate = new Date(2000, 0, 1, sH, sM);
        let wDate = new Date(2000, 0, 1, wH, wM);

        if (wDate <= sDate) {
            wDate.setDate(wDate.getDate() + 1);
        }

        let deltaMs = wDate - sDate - (10 * 60 * 1000);
        if (deltaMs < 0) deltaMs = 0;

        const totalMins = Math.floor(deltaMs / 60000);
        const h = Math.floor(totalMins / 60);
        const m = totalMins % 60;

        document.getElementById('durationOutputBox').innerHTML = `
            <div class="metric-row optimal" style="width: 100%">
                <div class="metric-core">
                    <span class="time-readout">${h}h ${m}m</span>
                </div>
                <span class="tag-status-optimal">Calculated Net Sleep</span>
            </div>`;
    }

    function runTargetAnalysis() {
        const wVal = document.getElementById('targetWakeTime').value;
        const hVal = parseFloat(document.getElementById('desiredHours').value);
        if (!wVal || isNaN(hVal)) return;

        saveState('targetWakeTime', wVal);
        saveState('desiredHours', hVal);

        const [wH, wM] = wVal.split(':').map(Number);
        let wDate = new Date(2000, 0, 2, wH, wM); 

        const totalSub = (hVal * 60) + 10;
        let bDate = new Date(wDate.getTime() - (totalSub * 60000));

        document.getElementById('targetOutputBox').innerHTML = `
            <div class="metric-row optimal" style="width: 100%">
                <div class="metric-core">
                    <span class="time-readout">${formatTimeStrings(bDate)}</span>
                </div>
                <span class="tag-status-optimal">Ideal Target Bedtime</span>
            </div>`;
    }

    // Default configuration hydration mapping
    const fallbackMap = {
        'bedtime': '22:30',
        'wakeuptime': '06:00',
        'directSleepTime': '23:00',
        'directWakeTime': '07:00',
        'targetWakeTime': '06:30',
        'desiredHours': '8'
    };

    Object.keys(fallbackMap).forEach(key => {
        const stored = localStorage.getItem(key);
        document.getElementById(key).value = stored !== null ? stored : fallbackMap[key];
    });
    
    // Initial evaluations setup
    runWakeupAnalysis();
    runBedtimeAnalysis();
    runDurationAnalysis();
    runTargetAnalysis();

    // Fire continuous engine loop sequences
    systemHeartbeatEngine();
    setInterval(systemHeartbeatEngine, 1000);
</script>

</body>
</html>
