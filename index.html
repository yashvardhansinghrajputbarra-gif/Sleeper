<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REM Sleep Cycle Optimizer (Eye-Care Mode)</title>

    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            /* Ultra-low brightness, warm-toned variables */
            --bg-base: #000000;
            --panel-bg: #060606;
            --border-glow: rgba(184, 178, 167, 0.03);
            
            /* Eliminating pure white for warm, muted ash/parchment tones */
            --text-pure: #b8b2a7;
            --text-muted: #66615b;
            --text-ghost: rgba(184, 178, 167, 0.12);
            
            /* Burnt amber/orange instead of harsh greens and blues */
            --glow-amber: rgba(163, 92, 51, 0.15);
            --optimal-accent: #a35c33;
            --notice-accent: #8a7558;
        }

        body {
            margin: 0;
            background: var(--bg-base);
            color: var(--text-pure);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
            padding: 40px 20px;
        }

        .dashboard-frame {
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            border-top: 1px solid rgba(184, 178, 167, 0.04);
            border-radius: 32px;
            padding: 45px 50px;
            width: 100%;
            max-width: 960px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.95); 
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-title {
            margin: 0;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .header-meta {
            margin: 8px 0 0 0;
            color: var(--text-ghost);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .split-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            position: relative;
            margin-bottom: 40px;
        }

        .split-grid::after {
            content: "";
            position: absolute;
            top: 5%;
            bottom: 5%;
            left: 50%;
            width: 1px;
            background: radial-gradient(circle, rgba(184, 178, 167, 0.03) 0%, transparent 100%);
            transform: translateX(-50%);
        }

        .full-width-section {
            border-top: 1px dashed rgba(184, 178, 167, 0.06);
            padding-top: 40px;
            margin-top: 20px;
        }

        .column-section {
            display: flex;
            flex-direction: column;
        }

        .column-headline {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .interactive-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(184, 178, 167, 0.02);
            padding-bottom: 16px;
            margin-bottom: 25px;
            gap: 15px;
        }

        .clutter-free-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .input-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .input-meta-box {
            display: flex;
            flex-direction: column;
        }

        .input-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-ghost);
            margin-bottom: 6px;
        }

        input[type="time"], input[type="number"] {
            background: transparent;
            border: none;
            color: var(--text-pure);
            font-size: 22px;
            font-weight: 700;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            letter-spacing: -0.5px;
        }

        input[type="number"] {
            width: 70px;
            border-bottom: 1px dashed rgba(184, 178, 167, 0.2);
            text-align: center;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8) sepia(0.2) opacity(0.15); 
        }

        .action-capsule {
            background: transparent;
            border: 1px solid rgba(184, 178, 167, 0.05);
            color: var(--text-muted);
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .action-capsule:hover {
            background: rgba(184, 178, 167, 0.03);
            color: var(--text-pure);
            border-color: rgba(184, 178, 167, 0.1);
        }

        .output-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .metric-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 10px 0;
            border-bottom: 1px solid rgba(184, 178, 167, 0.01);
            animation: renderIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .direct-result-box {
            min-height: 50px;
            display: flex;
            align-items: center;
        }

        .metric-identity {
            display: flex;
            align-items: baseline;
            gap: 16px;
        }

        .cycle-count {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-ghost);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 30px;
        }

        .time-value {
            font-size: 30px;
            font-weight: 700;
            color: var(--text-pure);
            letter-spacing: -1px;
            line-height: 1;
        }

        .duration-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: lowercase;
        }

        .status-tracker {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .metric-item.past { opacity: 0.1; }

        .metric-item.optimal .time-value {
            text-shadow: 0 0 20px var(--glow-amber);
            color: #d1c8ba;
        }
        
        .metric-item.optimal .status-tracker { color: var(--optimal-accent); }
        
        .metric-item.optimal .status-tracker::before {
            content: ""; 
            width: 5px; 
            height: 5px; 
            background: var(--optimal-accent); 
            border-radius: 50%;
            box-shadow: 0 0 8px var(--glow-amber);
        }

        .notice-banner {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            padding-bottom: 14px;
            border-bottom: 1px dashed rgba(184, 178, 167, 0.03);
            margin-bottom: 10px;
            letter-spacing: 0.2px;
        }

        .notice-banner span {
            color: var(--notice-accent);
            font-weight: 600;
        }

        @keyframes renderIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 850px) {
            .dashboard-frame { padding: 35px 24px; }
            .split-grid, .clutter-free-grid { grid-template-columns: 1fr; gap: 40px; }
            .split-grid::after { display: none; }
        }
    </style>
</head>
<body>

    <div class="dashboard-frame">
        <header>
            <h1 class="header-title">REM Sleep Optimizer</h1>
            <p class="header-meta">90 Minute Cycles • 10 Minute Buffer</p>
        </header>

        <div class="split-grid">
            <div class="column-section">
                <div class="column-headline">🌙 Bedtime Strategy</div>
                <div class="interactive-row">
                    <div class="input-meta-box">
                        <span class="input-label">Planned Onset</span>
                        <input type="time" id="bedtime" onchange="saveInput(this)">
                    </div>
                    <button class="action-capsule" onclick="calculateWakeup()">Run Analysis</button>
                </div>
                <div class="output-stack" id="bedtimeResults"></div>
            </div>

            <div class="column-section">
                <div class="column-headline">☀️ Wakeup Target</div>
                <div class="interactive-row">
                    <div class="input-meta-box">
                        <span class="input-label">Alarm Configuration</span>
                        <input type="time" id="wakeuptime" value="05:15" onchange="saveInput(this)">
                    </div>
                    <button class="action-capsule" onclick="calculateBedtimes()">Run Backtrack</button>
                </div>
                <div class="output-stack" id="wakeupResults"></div>
            </div>
        </div>

        <div class="full-width-section">
            <div class="clutter-free-grid">
                
                <div class="column-section">
                    <div class="column-headline">⏱️ Sleep Duration Evaluator</div>
                    <div class="interactive-row">
                        <div class="input-group">
                            <div class="input-meta-box">
                                <span class="input-label">Sleep Time</span>
                                <input type="time" id="directSleepTime" onchange="saveInput(this)">
                            </div>
                            <div class="input-meta-box">
                                <span class="input-label">Wake Time</span>
                                <input type="time" id="directWakeTime" value="07:00" onchange="saveInput(this)">
                            </div>
                        </div>
                        <button class="action-capsule" onclick="evaluateDuration()">Calculate</button>
                    </div>
                    <div class="direct-result-box" id="durationResult"></div>
                </div>

                <div class="column-section">
                    <div class="column-headline">🎯 Specific Hours Target</div>
                    <div class="interactive-row">
                        <div class="input-group">
                            <div class="input-meta-box">
                                <span class="input-label">Wake Target</span>
                                <input type="time" id="targetWakeTime" value="06:00" onchange="saveInput(this)">
                            </div>
                            <div class="input-meta-box">
                                <span class="input-label">Hours Desired</span>
                                <input type="number" id="desiredHours" value="8" min="1" max="24" step="0.5" onchange="saveInput(this)">
                            </div>
                        </div>
                        <button class="action-capsule" onclick="evaluateBedtimeTarget()">Find Bedtime</button>
                    </div>
                    <div class="direct-result-box" id="targetBedtimeResult"></div>
                </div>

            </div>
        </div>
    </div>

<script>
    function formatAMPM(date) {
        let hours = date.getHours();
        let minutes = date.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12;
        minutes = minutes < 10 ? '0' + minutes : minutes;
        return `${hours}:${minutes} ${ampm}`;
    }

    // Helper to save data to localStorage on change
    function saveInput(element) {
        localStorage.setItem(element.id, element.value);
    }

    function calculateWakeup() {
        const bedtimeInput = document.getElementById('bedtime').value;
        if (!bedtimeInput) return;

        const [hours, minutes] = bedtimeInput.split(':').map(Number);
        let sleepTime = new Date();
        sleepTime.setHours(hours, minutes, 0, 0);
        
        sleepTime.setMinutes(sleepTime.getMinutes() + 10);

        const container = document.getElementById('bedtimeResults');
        container.innerHTML = `<div class="notice-banner">True sleep onset timed at <span>${formatAMPM(sleepTime)}</span></div>`;
        
        [2, 3, 4, 5].forEach(cycles => {
            const duration = cycles * 90;
            const wakeup = new Date(sleepTime.getTime() + duration * 60000);
            
            const item = document.createElement('div');
            item.className = 'metric-item standard';
            item.innerHTML = `
                <div class="metric-identity">
                    <span class="cycle-count">${cycles} C</span>
                    <span class="time-value">${formatAMPM(wakeup)}</span>
                </div>
                <span class="duration-label">${Math.floor(duration / 60)}h ${duration % 60}m</span>
            `;
            container.appendChild(item);
        });
    }

    function calculateBedtimes() {
        const wakeupInput = document.getElementById('wakeuptime').value;
        if (!wakeupInput) return;

        const [wHours, wMinutes] = wakeupInput.split(':').map(Number);
        const now = new Date();
        
        let wakeupTime = new Date();
        wakeupTime.setHours(wHours, wMinutes, 0, 0);

        if (wakeupTime < now && (now.getTime() - wakeupTime.getTime() > 3600000)) {
            wakeupTime.setDate(wakeupTime.getDate() + 1);
        }

        const container = document.getElementById('wakeupResults');
        container.innerHTML = "";
        
        let optimalFound = false;

        [5, 4, 3, 2].forEach(cycles => {
            const duration = cycles * 90;
            const bedtime = new Date(wakeupTime.getTime() - (duration + 10) * 60000);
            const item = document.createElement('div');
            
            const hoursCount = Math.floor(duration / 60);
            const minsCount = duration % 60;

            if (now > bedtime) {
                item.className = 'metric-item past';
                item.innerHTML = `
                    <div class="metric-identity">
                        <span class="cycle-count">${cycles} C</span>
                        <span class="time-value">${formatAMPM(bedtime)}</span>
                    </div>
                    <span class="duration-label">elapsed</span>
                `;
            } else if (!optimalFound) {
                item.className = 'metric-item optimal';
                item.innerHTML = `
                    <div class="metric-identity">
                        <span class="cycle-count">${cycles} C</span>
                        <span class="time-value">${formatAMPM(bedtime)}</span>
                    </div>
                    <span class="status-tracker">Optimal</span>
                `;
                optimalFound = true;
            } else {
                item.className = 'metric-item';
                item.innerHTML = `
                    <div class="metric-identity">
                        <span class="cycle-count">${cycles} C</span>
                        <span class="time-value">${formatAMPM(bedtime)}</span>
                    </div>
                    <span class="duration-label">${hoursCount}h ${minsCount}m</span>
                `;
            }
            container.appendChild(item);
        });
    }

    function evaluateDuration() {
        const sleepInput = document.getElementById('directSleepTime').value;
        const wakeInput = document.getElementById('directWakeTime').value;
        if (!sleepInput || !wakeInput) return;

        const [sH, sM] = sleepInput.split(':').map(Number);
        const [wH, wM] = wakeInput.split(':').map(Number);

        let sleepDate = new Date(2000, 0, 1, sH, sM);
        let wakeDate = new Date(2000, 0, 1, wH, wM);

        if (wakeDate <= sleepDate) {
            wakeDate.setDate(wakeDate.getDate() + 1);
        }

        let diffMs = wakeDate - sleepDate - (10 * 60 * 1000);
        if (diffMs < 0) diffMs = 0;

        const totalMinutes = Math.floor(diffMs / 60000);
        const hrs = Math.floor(totalMinutes / 60);
        const mins = totalMinutes % 60;

        const container = document.getElementById('durationResult');
        container.innerHTML = `
            <div class="metric-item optimal" style="width:100%">
                <div class="metric-identity">
                    <span class="time-value">${hrs}h ${mins}m</span>
                </div>
                <span class="status-tracker">(minus 10m buffer)</span>
            </div>
        `;
    }

    function evaluateBedtimeTarget() {
        const wakeInput = document.getElementById('targetWakeTime').value;
        const hoursDesired = parseFloat(document.getElementById('desiredHours').value);
        if (!wakeInput || isNaN(hoursDesired)) return;

        const [wH, wM] = wakeInput.split(':').map(Number);
        let wakeDate = new Date(2000, 0, 2, wH, wM); 

        const totalMinutesToSubtract = (hoursDesired * 60) + 10;
        let bedtimeDate = new Date(wakeDate.getTime() - (totalMinutesToSubtract * 60000));

        const container = document.getElementById('targetBedtimeResult');
        container.innerHTML = `
            <div class="metric-item optimal" style="width:100%">
                <div class="metric-identity">
                    <span class="time-value">${formatAMPM(bedtimeDate)}</span>
                </div>
                <span class="status-tracker">Ideal Bedtime</span>
            </div>
        `;
    }

    // Initialization logic supporting local persistence
    const now = new Date();
    const formattedNow = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    
    // List of input elements to load dynamically
    const inputs = ['bedtime', 'wakeuptime', 'directSleepTime', 'directWakeTime', 'targetWakeTime', 'desiredHours'];
    
    inputs.forEach(id => {
        const savedValue = localStorage.getItem(id);
        if (savedValue !== null) {
            document.getElementById(id).value = savedValue;
        } else {
            // Fallback setup if no storage exists yet
            if (id === 'bedtime' || id === 'directSleepTime') {
                document.getElementById(id).value = formattedNow;
            }
        }
    });
    
    // Automatically trigger calculations on refresh
    calculateWakeup();
    calculateBedtimes();
    evaluateDuration();
    evaluateBedtimeTarget();
</script>

</body>
</html>
