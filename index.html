<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REM Sleep Cycle Optimizer (Premium Eye-Care)</title>

    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-base: #050505;
            --panel-bg: #0c0c0c;
            --panel-border: rgba(184, 178, 167, 0.06);
            
            --text-pure: #dcd7cd;
            --text-muted: #858075;
            --text-ghost: rgba(184, 178, 167, 0.25);
            
            --glow-amber: rgba(212, 116, 61, 0.2);
            --optimal-accent: #d4743d;
            --notice-accent: #a38f72;
            --radius-lg: 24px;
            --radius-md: 12px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            background: var(--bg-base);
            color: var(--text-pure);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 40px 20px;
        }

        .dashboard-frame {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 100%;
            max-width: 1000px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-title {
            margin: 0;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--text-pure);
            text-transform: uppercase;
        }

        .live-clock-banner {
            margin-top: 8px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--optimal-accent);
            text-shadow: 0 0 10px var(--glow-amber);
        }

        .header-meta {
            margin: 6px 0 0 0;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .split-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            margin-bottom: 40px;
        }

        .full-width-section {
            border-top: 1px solid var(--panel-border);
            padding-top: 40px;
        }

        .clutter-free-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
        }

        .column-section {
            display: flex;
            flex-direction: column;
        }

        .column-headline {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .interactive-card {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(184, 178, 167, 0.04);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .interactive-card:focus-within {
            border-color: rgba(212, 116, 61, 0.3);
            background: rgba(255, 255, 255, 0.02);
        }

        .input-group {
            display: flex;
            gap: 24px;
            align-items: center;
            width: 100%;
        }

        .input-meta-box {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .input-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="time"], input[type="number"] {
            background: transparent;
            border: none;
            color: var(--text-pure);
            font-size: 24px;
            font-weight: 700;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            padding: 0;
        }

        input[type="number"] {
            width: 80px;
            border-bottom: 1px dashed var(--text-ghost);
            text-align: left;
        }

        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8) sepia(0.2) opacity(0.3);
        }

        .live-countdown-badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(184, 178, 167, 0.05);
            color: var(--notice-accent);
            white-space: nowrap;
        }

        .output-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 50px;
        }

        .metric-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            animation: renderIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .metric-identity {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .cycle-count {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            background: rgba(184, 178, 167, 0.06);
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .time-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-pure);
            letter-spacing: -0.5px;
        }

        .duration-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .status-tracker {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--optimal-accent);
        }

        .metric-item.past { 
            opacity: 0.25;
            background: transparent;
        }
        .metric-item.past .cycle-count { background: transparent; }

        .metric-item.optimal {
            background: rgba(212, 116, 61, 0.04);
            border-color: rgba(212, 116, 61, 0.15);
        }
        
        .metric-item.optimal .time-value {
            text-shadow: 0 0 15px var(--glow-amber);
            color: #fff4e0;
        }
        
        .metric-item.optimal .status-tracker::before {
            content: ""; 
            width: 6px; 
            height: 6px; 
            background: var(--optimal-accent); 
            border-radius: 50%;
            box-shadow: 0 0 8px var(--optimal-accent);
        }

        .notice-banner {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            padding: 0 4px 10px 4px;
        }

        .notice-banner span {
            color: var(--notice-accent);
            font-weight: 600;
        }

        @keyframes renderIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 850px) {
            body { padding: 10px; }
            .dashboard-frame { padding: 24px 16px; border-radius: 16px; }
            .split-grid, .clutter-free-grid { grid-template-columns: 1fr; gap: 35px; }
            .interactive-card { padding: 16px; }
        }
    </style>
</head>
<body>

    <div class="dashboard-frame">
        <header>
            <h1 class="header-title">REM Sleep Optimizer</h1>
            <div class="live-clock-banner" id="liveSystemClock">--:--:-- --</div>
            <p class="header-meta">Standard 90-Min Cycles • 10-Min Sleep Onset Buffer</p>
        </header>

        <div class="split-grid">
            <div class="column-section">
                <div class="column-headline">🌙 Bedtime Strategy</div>
                <div class="interactive-card">
                    <div class="input-meta-box">
                        <span class="input-label">Planned Bedtime</span>
                        <input type="time" id="bedtime" oninput="calculateWakeup()">
                    </div>
                    <div class="live-countdown-badge" id="bedtimeCountdown">--:-- left</div>
                </div>
                <div id="bedtimeNotice"></div>
                <div class="output-stack" id="bedtimeResults"></div>
            </div>

            <div class="column-section">
                <div class="column-headline">☀️ Wakeup Target</div>
                <div class="interactive-card">
                    <div class="input-meta-box">
                        <span class="input-label">Alarm Target</span>
                        <input type="time" id="wakeuptime" oninput="calculateBedtimes()">
                    </div>
                    <div class="live-countdown-badge" id="wakeupCountdown">--:-- left</div>
                </div>
                <div class="output-stack" id="wakeupResults"></div>
            </div>
        </div>

        <div class="full-width-section">
            <div class="clutter-free-grid">
                
                <div class="column-section">
                    <div class="column-headline">⏱️ Sleep Duration Evaluator</div>
                    <div class="interactive-card">
                        <div class="input-group">
                            <div class="input-meta-box">
                                <span class="input-label">Sleep Time</span>
                                <input type="time" id="directSleepTime" oninput="evaluateDuration()">
                            </div>
                            <div class="input-meta-box">
                                <span class="input-label">Wake Time</span>
                                <input type="time" id="directWakeTime" oninput="evaluateDuration()">
                            </div>
                        </div>
                    </div>
                    <div class="output-stack" id="durationResult"></div>
                </div>

                <div class="column-section">
                    <div class="column-headline">🎯 Specific Hours Target</div>
                    <div class="interactive-card">
                        <div class="input-group">
                            <div class="input-meta-box">
                                <span class="input-label">Wake Target</span>
                                <input type="time" id="targetWakeTime" oninput="evaluateBedtimeTarget()">
                            </div>
                            <div class="input-meta-box">
                                <span class="input-label">Hours Desired</span>
                                <input type="number" id="desiredHours" min="1" max="24" step="0.5" oninput="evaluateBedtimeTarget()">
                            </div>
                        </div>
                    </div>
                    <div class="output-stack" id="targetBedtimeResult"></div>
                </div>

            </div>
        </div>
    </div>

<script>
    function formatAMPM(date) {
        let hours = date.getHours();
        let minutes = date.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12;
        minutes = minutes < 10 ? '0' + minutes : minutes;
        return `${hours}:${minutes} ${ampm}`;
    }

    function saveValue(id, value) {
        localStorage.setItem(id, value);
    }

    // Helper to calculate target dates for structural time adjustments
    function getNextTargetDate(timeString) {
        if (!timeString) return null;
        const [h, m] = timeString.split(':').map(Number);
        const now = new Date();
        let target = new Date();
        target.setHours(h, m, 0, 0);
        if (target < now) {
            target.setDate(target.getDate() + 1);
        }
        return target;
    }

    function updateLiveCounters() {
        const now = new Date();
        
        // 1. Update Top Header Wall Clock
        let sec = now.getSeconds();
        document.getElementById('liveSystemClock').innerText = `${formatAMPM(now).replace(' ', `:${sec < 10 ? '0' + sec : sec} `)}`;

        // 2. Update Bedtime Countdown Element
        const bedtimeInput = document.getElementById('bedtime').value;
        const bedtimeBadge = document.getElementById('bedtimeCountdown');
        if (bedtimeInput) {
            const targetBed = getNextTargetDate(bedtimeInput);
            let diff = targetBed - now;
            let hrs = Math.floor(diff / 3600000);
            let mins = Math.floor((diff % 3600000) / 60000);
            bedtimeBadge.innerText = `${hrs}h ${mins}m left`;
        }

        // 3. Update Alarm Target Countdown Element
        const wakeupInput = document.getElementById('wakeuptime').value;
        const wakeupBadge = document.getElementById('wakeupCountdown');
        if (wakeupInput) {
            const targetWake = getNextTargetDate(wakeupInput);
            let diff = targetWake - now;
            let hrs = Math.floor(diff / 3600000);
            let mins = Math.floor((diff % 3600000) / 60000);
            wakeupBadge.innerText = `${hrs}h ${mins}m left`;
        }
    }

    function calculateWakeup() {
        const bedtimeInput = document.getElementById('bedtime').value;
        if (!bedtimeInput) return;
        saveValue('bedtime', bedtimeInput);

        const [hours, minutes] = bedtimeInput.split(':').map(Number);
        let sleepTime = new Date();
        sleepTime.setHours(hours, minutes, 0, 0);
        sleepTime.setMinutes(sleepTime.getMinutes() + 10);

        document.getElementById('bedtimeNotice').innerHTML = `
            <div class="notice-banner">Estimated sleep onset at <span>${formatAMPM(sleepTime)}</span></div>
        `;
        
        const container = document.getElementById('bedtimeResults');
        container.innerHTML = "";
        
        [3, 4, 5, 6].forEach(cycles => {
            const duration = cycles * 90;
            const wakeup = new Date(sleepTime.getTime() + duration * 60000);
            const item = document.createElement('div');
            item.className = (cycles === 5 || cycles === 6) ? 'metric-item optimal' : 'metric-item';
            
            item.innerHTML = `
                <div class="metric-identity">
                    <span class="cycle-count">${cycles} Cycles</span>
                    <span class="time-value">${formatAMPM(wakeup)}</span>
                </div>
                ${(cycles === 5 || cycles === 6) ? '<span class="status-tracker">Optimal</span>' : `<span class="duration-label">${Math.floor(duration / 60)}h ${duration % 60}m</span>`}
            `;
            container.appendChild(item);
        });
    }

    function calculateBedtimes() {
        const wakeupInput = document.getElementById('wakeuptime').value;
        if (!wakeupInput) return;
        saveValue('wakeuptime', wakeupInput);

        const [wHours, wMinutes] = wakeupInput.split(':').map(Number);
        const now = new Date();
        let wakeupTime = new Date();
        wakeupTime.setHours(wHours, wMinutes, 0, 0);

        if (wakeupTime < now && (now.getTime() - wakeupTime.getTime() > 3600000)) {
            wakeupTime.setDate(wakeupTime.getDate() + 1);
        }

        const container = document.getElementById('wakeupResults');
        container.innerHTML = "";
        let optimalFound = false;

        [6, 5, 4, 3].forEach(cycles => {
            const duration = cycles * 90;
            const bedtime = new Date(wakeupTime.getTime() - (duration + 10) * 60000);
            const item = document.createElement('div');
            const hoursCount = Math.floor(duration / 60);
            const minsCount = duration % 60;

            if (now > bedtime) {
                item.className = 'metric-item past';
                item.innerHTML = `
                    <div class="metric-identity">
                        <span class="cycle-count">${cycles} Cycles</span>
                        <span class="time-value">${formatAMPM(bedtime)}</span>
                    </div>
                    <span class="duration-label">Past</span>
                `;
            } else if (!optimalFound && (cycles === 5 || cycles === 6)) {
                item.className = 'metric-item optimal';
                item.innerHTML = `
                    <div class="metric-identity">
                        <span class="cycle-count">${cycles} Cycles</span>
                        <span class="time-value">${formatAMPM(bedtime)}</span>
                    </div>
                    <span class="status-tracker">Optimal</span>
                `;
                optimalFound = true;
            } else {
                item.className = 'metric-item';
                item.innerHTML = `
                    <div class="metric-identity">
                        <span class="cycle-count">${cycles} Cycles</span>
                        <span class="time-value">${formatAMPM(bedtime)}</span>
                    </div>
                    <span class="duration-label">${hoursCount}h ${minsCount}m</span>
                `;
            }
            container.appendChild(item);
        });
    }

    function evaluateDuration() {
        const sleepInput = document.getElementById('directSleepTime').value;
        const wakeInput = document.getElementById('directWakeTime').value;
        if (!sleepInput || !wakeInput) return;
        
        saveValue('directSleepTime', sleepInput);
        saveValue('directWakeTime', wakeInput);

        const [sH, sM] = sleepInput.split(':').map(Number);
        const [wH, wM] = wakeInput.split(':').map(Number);

        let sleepDate = new Date(2000, 0, 1, sH, sM);
        let wakeDate = new Date(2000, 0, 1, wH, wM);

        if (wakeDate <= sleepDate) {
            wakeDate.setDate(wakeDate.getDate() + 1);
        }

        let diffMs = wakeDate - sleepDate - (10 * 60 * 1000);
        if (diffMs < 0) diffMs = 0;

        const totalMinutes = Math.floor(diffMs / 60000);
        const hrs = Math.floor(totalMinutes / 60);
        const mins = totalMinutes % 60;

        const container = document.getElementById('durationResult');
        container.innerHTML = `
            <div class="metric-item optimal">
                <div class="metric-identity">
                    <span class="time-value">${hrs}h ${mins}m</span>
                </div>
                <span class="status-tracker">Net Sleep Time</span>
            </div>
        `;
    }

    function evaluateBedtimeTarget() {
        const wakeInput = document.getElementById('targetWakeTime').value;
        const hoursDesired = parseFloat(document.getElementById('desiredHours').value);
        if (!wakeInput || isNaN(hoursDesired)) return;

        saveValue('targetWakeTime', wakeInput);
        saveValue('desiredHours', hoursDesired);

        const [wH, wM] = wakeInput.split(':').map(Number);
        let wakeDate = new Date(2000, 0, 2, wH, wM); 

        const totalMinutesToSubtract = (hoursDesired * 60) + 10;
        let bedtimeDate = new Date(wakeDate.getTime() - (totalMinutesToSubtract * 60000));

        const container = document.getElementById('targetBedtimeResult');
        container.innerHTML = `
            <div class="metric-item optimal">
                <div class="metric-identity">
                    <span class="time-value">${formatAMPM(bedtimeDate)}</span>
                </div>
                <span class="status-tracker">Ideal Wind Down</span>
            </div>
        `;
    }

    // Initialize inputs safely with fallbacks
    const defaultTimes = {
        'bedtime': '23:00',
        'wakeuptime': '07:00',
        'directSleepTime': '23:00',
        'directWakeTime': '07:00',
        'targetWakeTime': '06:30',
        'desiredHours': '8'
    };

    Object.keys(defaultTimes).forEach(id => {
        const saved = localStorage.getItem(id);
        document.getElementById(id).value = saved !== null ? saved : defaultTimes[id];
    });
    
    // Initial runtime execution
    calculateWakeup();
    calculateBedtimes();
    evaluateDuration();
    evaluateBedtimeTarget();

    // Start Real-time ticking loops
    updateLiveCounters();
    setInterval(updateLiveCounters, 1000);
</script>

</body>
</html>
